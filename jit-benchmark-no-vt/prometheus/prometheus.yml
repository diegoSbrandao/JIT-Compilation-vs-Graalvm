global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: app-jvm
    static_configs:
      - targets: ['app-jvm:8080']
    metrics_path: /actuator/prometheus
    metric_relabel_configs:
      - target_label: application
        replacement: app-jvm

  - job_name: app-native
    static_configs:
      - targets: ['app-native:8081']
    metrics_path: /actuator/prometheus
    metric_relabel_configs:
      - target_label: application
        replacement: app-native
